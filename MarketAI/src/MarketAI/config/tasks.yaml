# ──────────────────────────────── MARKETING TASKS (SMALL VERSION) ────────────────────────────────

# ── 1. Market Research ────────────────────────────────────────────────────────
market_research:
  description: >
    Do a brief market analysis for the product. Focus only on key trends,
    main competitors, and customer pain points.

    <Product Name>{product_name}</Product Name>
    <Target Audience>{target_audience}</Target Audience>

    IMPORTANT:
    - Keep response short (max 300 words)
    - Focus only on useful insights

    TOOL RULES:
    - You MUST invoke file_writer_tool to save the file
    - Save filename: market_research.md to directory: output/research

  expected_output: >
    A short markdown report including:
    - 2–3 key trends
    - 2–3 competitors (name + positioning)
    - 2–3 customer pain points
    Saved to 'output/research/market_research.md'.


# ── 2. Marketing Strategy ─────────────────────────────────────────────────────
prepare_marketing_strategy:
  description: >
    Create a simple 1-week marketing plan based on the research.

    <Product Name>{product_name}</Product Name>
    <Target Audience>{target_audience}</Target Audience>

    IMPORTANT:
    - Keep response under 300 words
    - Be concise

    TOOL RULES:
    - You MUST invoke file_writer_tool to save the file
    - Save filename: marketing_strategy.md to directory: output/strategy

  expected_output: >
    A short markdown strategy including:
    - Value proposition (1–2 lines)
    - Target audience summary
    - Simple budget split
    - Content plan (3 posts + 1 reel)
    - Outreach plan (1 email + 1 DM)
    Saved to 'output/strategy/marketing_strategy.md'.


# ── 3. Content Calendar ───────────────────────────────────────────────────────
create_content_calendar:
  description: >
    Create a simple 3-day content plan.

    IMPORTANT:
    - Keep it minimal

    TOOL RULES:
    - You MUST invoke file_writer_tool to save the file
    - Save filename: content_calendar.md to directory: output/content

  expected_output: >
    A markdown table with:
    - Day
    - Platform
    - Content type
    - Topic
    Saved to 'output/content/content_calendar.md'.


# ── 4. Social Media Posts ─────────────────────────────────────────────────────
create_social_media_posts:
  description: >
    Write 3 short social media posts.

    IMPORTANT:
    - Max 100 words per post
    - Keep simple

    TOOL RULES:
    - You MUST invoke file_writer_tool 3 separate times, once per post
    - Do NOT write tool calls as plain text — actually invoke the tool
    - Save filename: post_1.md to directory: output/posts
    - Save filename: post_2.md to directory: output/posts
    - Save filename: post_3.md to directory: output/posts

  expected_output: >
    Confirmation that 3 files were saved to 'output/posts/'.


# ── 5. Reel Scripts ───────────────────────────────────────────────────────────
prepare_scripts_for_reels:
  description: >
    Write 1 short Instagram reel script.

    IMPORTANT:
    - Max 100 words
    - Simple hook + CTA

    TOOL RULES:
    - You MUST invoke file_writer_tool to save the file
    - Do NOT write the tool call as plain text — actually invoke the tool
    - Save filename: reel_1.md to directory: output/reels

  expected_output: >
    Confirmation that reel_1.md was saved to 'output/reels/'.


# ── 6. ICP Research ───────────────────────────────────────────────────────────
icp_research:
  description: >
    Define 2 simple customer personas.

    IMPORTANT:
    - Keep concise

    TOOL RULES:
    - You MUST invoke file_writer_tool to save the file
    - Save filename: icp_research.md to directory: output/research

  expected_output: >
    Markdown with:
    - Persona name
    - 2 pain points
    - 1 goal
    Saved to 'output/research/icp_research.md'.


# ── 7. Cold Emails ───────────────────────────────────────────────────────────
write_cold_email_templates:
  description: >
    Write 2 short cold emails.

    IMPORTANT:
    - Max 120 words each
    - Simple tone

    TOOL RULES:
    - You MUST invoke file_writer_tool 2 separate times, once per email
    - Do NOT write tool calls as plain text — actually invoke the tool
    - Save filename: email_1.md to directory: output/emails
    - Save filename: email_2.md to directory: output/emails

  expected_output: >
    Confirmation that email_1.md and email_2.md were saved to 'output/emails/'.


# ── 8. Outreach Messages ─────────────────────────────────────────────────────
write_outreach_messages:
  description: >
    Write simple outreach messages.

    IMPORTANT:
    - Keep short and human

    TOOL RULES:
    - You MUST invoke file_writer_tool to save the file
    - Do NOT write tool calls as plain text — actually invoke the tool
    - Save filename: outreach.md to directory: output/outreach

  expected_output: >
    Markdown with:
    - 1 LinkedIn message
    - 1 Instagram DM
    Saved to 'output/outreach/outreach.md'.
