# ──────────────────────────────── MARKETING TASKS (SMALL VERSION) ────────────────────────────────

# ── 1. Market Research ────────────────────────────────────────────────────────
market_research:
  description: >
    Do a brief market analysis for the product. Focus only on key trends,
    main competitors, and customer pain points.

    <Product Name>{product_name}</Product Name>
    <Target Audience>{target_audience}</Target Audience>

    IMPORTANT:
    - Keep response short (max 300 words)
    - Focus only on useful insights

  expected_output: >
    A short markdown report including:
    - 2–3 key trends
    - 2–3 competitors (name + positioning)
    - 2–3 customer pain points
    Save to 'resources/drafts/market_research.md'.


# ── 2. Marketing Strategy ─────────────────────────────────────────────────────
prepare_marketing_strategy:
  description: >
    Create a simple 1-week marketing plan based on the research.

    <Product Name>{product_name}</Product Name>
    <Target Audience>{target_audience}</Target Audience>

    IMPORTANT:
    - Keep response under 300 words
    - Be concise

  expected_output: >
    A short markdown strategy including:
    - Value proposition (1–2 lines)
    - Target audience summary
    - Simple budget split
    - Content plan (3 posts + 1 reel)
    - Outreach plan (1 email + 1 DM)
    Save to 'resources/drafts/marketing_strategy.md'.


# ── 3. Content Calendar ───────────────────────────────────────────────────────
create_content_calendar:
  description: >
    Create a simple 3-day content plan.

    IMPORTANT:
    - Keep it minimal

  expected_output: >
    A markdown table with:
    - Day
    - Platform
    - Content type
    - Topic
    Save to 'resources/drafts/content_calendar.md'.


# ── 4. Social Media Posts ─────────────────────────────────────────────────────
create_social_media_posts:
  description: >
    Write 3 short social media posts.

    IMPORTANT:
    - Max 100 words per post
    - Keep simple

    TOOL RULES:
    - Save each post using file_writer_tool
    - post_1.md, post_2.md, post_3.md

  expected_output: >
    Confirmation that 3 posts were saved.


# ── 5. Reel Scripts ───────────────────────────────────────────────────────────
prepare_scripts_for_reels:
  description: >
    Write 1 short Instagram reel script.

    IMPORTANT:
    - Max 100 words
    - Simple hook + CTA

    TOOL RULES:
    - Save to reel_1.md

  expected_output: >
    Confirmation file saved.


# ── 6. ICP Research ───────────────────────────────────────────────────────────
icp_research:
  description: >
    Define 2 simple customer personas.

    IMPORTANT:
    - Keep concise

  expected_output: >
    Markdown with:
    - Persona name
    - 2 pain points
    - 1 goal
    Save to 'resources/drafts/icp_research.md'.


# ── 7. Cold Emails ───────────────────────────────────────────────────────────
write_cold_email_templates:
  description: >
    Write 2 short cold emails.

    IMPORTANT:
    - Max 120 words each
    - Simple tone

    TOOL RULES:
    - Save as email_1.md and email_2.md

  expected_output: >
    Confirmation files saved.


# ── 8. Outreach Messages ─────────────────────────────────────────────────────
write_outreach_messages:
  description: >
    Write simple outreach messages.

    IMPORTANT:
    - Keep short and human

  expected_output: >
    Markdown with:
    - 1 LinkedIn message
    - 1 Instagram DM
    Save to 'resources/drafts/outreach.md'.